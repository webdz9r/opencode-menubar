name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: macos-latest
    if: github.repository == 'webdz9r/opencode-menubar'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # --- Import Developer ID Certificate ---

      - name: Create temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Import certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Verify certificate
        run: |
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | \
            grep -q "Developer ID Application"
          echo "Developer ID certificate imported successfully"

      # --- Build and Sign ---

      - name: Build
        run: make build

      - name: Sign with Developer ID
        run: make sign

      # --- Notarize ---

      - name: Write API key
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
        run: |
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary_key.p8"
          echo "NOTARY_KEY_PATH=$RUNNER_TEMP/notary_key.p8" >> "$GITHUB_ENV"

      - name: Notarize and staple
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          echo "==> Creating zip for notarization..."
          ditto -c -k --keepParent build/OpenCodeMenuBar.app build/OpenCodeMenuBar.zip

          echo "==> Submitting to Apple..."
          xcrun notarytool submit build/OpenCodeMenuBar.zip \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait

          echo "==> Stapling ticket..."
          xcrun stapler staple build/OpenCodeMenuBar.app

          echo "==> Verifying..."
          spctl --assess --type execute --verbose=2 build/OpenCodeMenuBar.app

          rm -f build/OpenCodeMenuBar.zip

      # --- Package and Release ---

      - name: Create release zip
        run: |
          cd build
          ditto -c -k --keepParent OpenCodeMenuBar.app "OpenCodeMenuBar-v${{ steps.version.outputs.VERSION }}-arm64.zip"

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          # Write to file for gh release
          echo "$NOTES" > "$RUNNER_TEMP/release_notes.md"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OpenCodeMenuBar v${{ steps.version.outputs.VERSION }}" \
            --notes-file "$RUNNER_TEMP/release_notes.md" \
            "build/OpenCodeMenuBar-v${{ steps.version.outputs.VERSION }}-arm64.zip"

      # --- Cleanup ---

      - name: Cleanup keychain and secrets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/notary_key.p8"
          rm -f "$RUNNER_TEMP/release_notes.md"
